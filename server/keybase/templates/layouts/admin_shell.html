<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$title - $app_name</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <script>
    (function () {
      var theme = 'classic';
      try { theme = localStorage.getItem('keybase-theme') || 'classic'; } catch (err) {}
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
$admin_css
  </style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-wordmark"><b>$sidebar_title</b><span>$sidebar_subtitle</span></div>
    </div>
    <nav>$nav_html</nav>
    <div class="sidebar-footer">
      $back_html
      <div class="user-card">
        <img class="avatar" src="/assets/default-avatar.png" alt="">
        <div class="user-meta"><b>$admin_user</b><span>$shell_local_admin</span></div>
        <form class="sidebar-logout" method="post" action="/admin/logout" $logout_confirm>
          <button class="icon-button" type="submit" title="$shell_logout" aria-label="$shell_logout">$logout_icon</button>
        </form>
      </div>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="topbar-title"><b>$title</b><span>$topbar_subtitle</span></div>
      <div class="top-actions">
        <button class="icon-button" type="button" onclick="window.open('$github_url', '_blank', 'noopener,noreferrer')" title="$shell_github_tooltip" aria-label="$shell_github_tooltip">$github_icon</button>
        <button class="icon-button" type="button" data-open-modal="global-settings" title="$shell_control_center_tooltip" aria-label="$shell_control_center_tooltip">$control_icon</button>
      </div>
    </header>
    <div class="content">$body</div>
  </main>
</div>
$global_settings
$confirmation_modal
<script>
window.KEYBASE_CONFIRM_UI_COOKIE_NAME = "$confirm_ui_cookie_name";
$admin_js
</script>
</body>
</html>
