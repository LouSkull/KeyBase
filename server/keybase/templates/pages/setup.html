<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>$app_name Setup</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <script>(function(){var t='classic';try{t=localStorage.getItem('keybase-theme')||'classic';}catch(e){}document.documentElement.setAttribute('data-theme',t);})();</script>
  <style>
    :root { --bg: #e7eaf0; --panel: #f8f9fb; --line: #b7c0cc; --line-s: #c7d0dc; --text: #18202b; --muted: #667284; --input-bg: #fff; --input-border: #9aa7b7; --blue: #2463a6; --blue-border: #1c5188; --red: #9f2836; }
    html[data-theme="dark"] { --bg: #0d131d; --panel: #151d2a; --line: #344155; --line-s: #253144; --text: #e7edf6; --muted: #99a6ba; --input-bg: #0b111b; --input-border: #344155; --blue: #6aa7ff; --blue-border: #4a8ae8; --red: #ff8d9a; }
    html[data-theme="white"] { --bg: #fff; --panel: #fff; --line: #c9d1dc; --line-s: #dde3ea; --text: #111827; --muted: #5b6677; --input-bg: #fff; --input-border: #b0bac8; --blue: #2463a6; --blue-border: #1c5188; --red: #9f2836; }
    body { font-family: Arial, Helvetica, sans-serif; background: var(--bg); margin: 0; min-height: 100vh; display: grid; place-items: center; color: var(--text); transition: background .15s, color .15s; }
    .box { width: min(480px, 92vw); background: var(--panel); border: 1px solid var(--line); border-radius: 7px; padding: 18px; box-shadow: 0 15px 45px rgba(30,42,62,.16); }
    h1 { margin: 0 0 4px; font-size: 24px; }
    p { margin: 8px 0; }
    label { display: block; margin: 10px 0; font-weight: 700; }
    input { width: 100%; box-sizing: border-box; border: 1px solid var(--input-border); border-radius: 4px; padding: 8px; margin-top: 4px; background: var(--input-bg); color: var(--text); }
    button { border: 1px solid var(--blue-border); border-radius: 4px; background: var(--blue); color: #fff; padding: 7px 12px; cursor: pointer; }
    code { background: var(--panel); border: 1px solid var(--line-s); border-radius: 4px; padding: 1px 4px; overflow-wrap: anywhere; }
    ul { padding-left: 18px; color: var(--muted); }
    .muted { color: var(--muted); }
    .status-bad { color: var(--red); font-weight: 700; }
  </style>
</head>
<body>
  <div class="box">
    <h1>$setup_title</h1>
    <p class="muted">$setup_subtitle</p>
    $message
    <form method="post" action="/admin/register">
      <label>$setup_username<input name="username" minlength="3" maxlength="32" pattern="[A-Za-z0-9_.-]{3,32}" autocomplete="username" autofocus></label>
      <label>$setup_password<input type="password" name="password" minlength="6" maxlength="256" autocomplete="new-password"></label>
      <label>$setup_repeat<input type="password" name="password_confirm" minlength="6" maxlength="256" autocomplete="new-password"></label>
      <p><button type="submit">$setup_submit</button></p>
    </form>
    <p class="muted">$setup_credentials_note</p>
    <ul>
      <li>$setup_tip1</li>
      <li>$setup_tip2</li>
      <li>$setup_tip3</li>
    </ul>
  </div>
</body>
</html>
