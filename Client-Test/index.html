<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KeyBase API Test</title>
</head>
<body>
<h1>KeyBase API Test</h1>

<!-- ── Config ──────────────────────────────────────────── -->
<fieldset>
  <legend>Config</legend>
  <label>Admin URL (provision, info, suspend, resume, revoke)<br>
    <input id="cfg-admin" value="http://127.0.0.1:8080" size="40">
  </label><br><br>
  <label>API URL (verify, activate, check)<br>
    <input id="cfg-api" value="http://127.0.0.1:1311" size="40">
  </label><br><br>
  <label>Provision token header<br>
    <input id="cfg-header" value="X-KeyBase-Provision-Key" size="40">
  </label><br><br>
  <label>Provision token value<br>
    <input id="cfg-token" value="" size="40" placeholder="change-this-provision-token">
  </label>
</fieldset>

<!-- ── Client identity ─────────────────────────────────── -->
<fieldset>
  <legend>Client identity (used in verify/activate)</legend>
  <label>HWID (stable per browser, stored in localStorage)<br>
    <input id="client-hwid" size="72" readonly>
    <button onclick="regenHwid()">Regen</button>
  </label><br><br>
  <label>Public IP (fetched from ipify.org)<br>
    <input id="client-ip" size="20" readonly>
    <button onclick="detectIp()">Refresh</button>
    <span id="ip-status"></span>
  </label>
</fieldset>

<!-- ── Response ─────────────────────────────────────────── -->
<fieldset>
  <legend>Last response</legend>
  <pre id="resp" style="min-height:80px;border:1px solid #ccc;padding:8px;white-space:pre-wrap;word-break:break-all">(none)</pre>
</fieldset>

<!-- ── Provision ────────────────────────────────────────── -->
<fieldset>
  <legend>Provision key (admin API)</legend>
  <label>app_id <input id="p-app" value="default" size="20"></label><br>
  <label>count <input id="p-count" value="1" size="5" type="number" min="1"></label><br>
  <label>prefix <input id="p-prefix" value="" size="10" placeholder="auto"></label><br>
  <label>max_devices <input id="p-devices" value="1" size="5" type="number" min="1"></label><br>
  <label>duration_value <input id="p-dur-val" value="" size="6" placeholder="leave blank = lifetime"></label></label>
  <label>duration_unit
    <select id="p-dur-unit">
      <option value="">lifetime</option>
      <option value="hours">hours</option>
      <option value="days">days</option>
      <option value="weeks">weeks</option>
      <option value="months">months</option>
      <option value="years">years</option>
    </select>
  </label><br>
  <label>subscription_level <input id="p-sub" value="1" size="5" type="number" min="1"></label><br>
  <label>note <input id="p-note" value="" size="40"></label><br>
  <label>order_id <input id="p-order" value="" size="20"></label><br>
  <label>customer_id <input id="p-customer" value="" size="20"></label><br><br>
  <button onclick="doProvision()">Provision key</button>
</fieldset>

<!-- ── Verify / Activate ─────────────────────────────────── -->
<fieldset>
  <legend>Verify / Activate (public API)</legend>
  <label>app_id <input id="v-app" value="default" size="20"></label><br>
  <label>key <input id="v-key" value="" size="40" placeholder="XXXX-XXXX-XXXX-XXXX"></label><br>
  <label>version <input id="v-version" value="1.0.0" size="12"></label><br>
  <label>
    <input type="checkbox" id="v-use-detected" checked onchange="toggleManualIp()">
    Use detected IP &amp; HWID above
  </label><br>
  <div id="v-manual" style="display:none">
    <label>hwid <input id="v-hwid-manual" value="" size="50"></label><br>
    <label>ip <input id="v-ip-manual" value="" size="20"></label><br>
  </div>
  <br>
  <button onclick="doVerify('/api/v1/verify')">Verify</button>
  <button onclick="doVerify('/api/v1/activate')">Activate</button>
  <button onclick="doVerify('/api/v1/check')">Check</button>
</fieldset>

<!-- ── Key info ──────────────────────────────────────────── -->
<fieldset>
  <legend>Key info (admin API)</legend>
  <label>app_id <input id="i-app" value="default" size="20"></label><br>
  <label>key <input id="i-key" value="" size="40"></label><br><br>
  <button onclick="doKeyInfo()">Get info</button>
</fieldset>

<!-- ── Suspend / Resume / Revoke / Delete ────────────────── -->
<fieldset>
  <legend>Suspend / Resume / Revoke / Delete (admin API)</legend>
  <label>app_id <input id="m-app" value="default" size="20"></label><br>
  <label>key <input id="m-key" value="" size="40"></label><br>
  <label>reason <input id="m-reason" value="" size="40" placeholder="optional"></label><br><br>
  <button onclick="doKeyAction('/api/v1/keys/suspend')">Suspend</button>
  <button onclick="doKeyAction('/api/v1/keys/resume')">Resume</button>
  <button onclick="doKeyAction('/api/v1/keys/revoke')">Revoke</button>
  <button onclick="doKeyAction('/api/v1/keys/delete')">Delete</button>
</fieldset>

<script>
// ── Helpers ─────────────────────────────────────────────────
function adminBase() { return document.getElementById('cfg-admin').value.replace(/\/$/, ''); }
function apiBase()   { return document.getElementById('cfg-api').value.replace(/\/$/, ''); }
function token()     { return document.getElementById('cfg-token').value.trim(); }
function headerName(){ return document.getElementById('cfg-header').value.trim() || 'X-KeyBase-Provision-Key'; }

function showResp(data, ok) {
  var el = document.getElementById('resp');
  el.textContent = JSON.stringify(data, null, 2);
  el.style.background = ok ? '#efffef' : '#fff2f2';
}
function showErr(err) {
  document.getElementById('resp').textContent = 'ERROR: ' + err;
  document.getElementById('resp').style.background = '#fff2f2';
}

async function apiFetch(base, path, body, method) {
  method = method || 'POST';
  var headers = { 'Content-Type': 'application/json' };
  var authHeader = headerName();
  if (authHeader) headers[authHeader] = token();
  try {
    var r = await fetch(base + path, { method: method, headers: headers, body: body ? JSON.stringify(body) : undefined });
    var data = await r.json();
    showResp(data, data.ok !== false);
    return data;
  } catch(e) {
    showErr(e.message);
    return null;
  }
}

// ── HWID ────────────────────────────────────────────────────
function genHwid() {
  var arr = new Uint8Array(16);
  crypto.getRandomValues(arr);
  return Array.from(arr).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}
function loadHwid() {
  var h = localStorage.getItem('keybase_test_hwid');
  if (!h) { h = genHwid(); localStorage.setItem('keybase_test_hwid', h); }
  document.getElementById('client-hwid').value = h;
}
function regenHwid() {
  var h = genHwid();
  localStorage.setItem('keybase_test_hwid', h);
  document.getElementById('client-hwid').value = h;
}

// ── IP detection ─────────────────────────────────────────────
var IP_SERVICES = [
  'https://api4.ipify.org',
  'https://ipv4.icanhazip.com',
  'https://v4.ident.me'
];
async function detectIp() {
  document.getElementById('ip-status').textContent = 'detecting...';
  for (var i = 0; i < IP_SERVICES.length; i++) {
    try {
      var r = await fetch(IP_SERVICES[i], { signal: AbortSignal.timeout(4000) });
      var ip = (await r.text()).trim();
      if (ip && ip.length < 40) {
        document.getElementById('client-ip').value = ip;
        document.getElementById('ip-status').textContent = '✓';
        return;
      }
    } catch(e) {}
  }
  document.getElementById('client-ip').value = '';
  document.getElementById('ip-status').textContent = 'failed';
}

function toggleManualIp() {
  var use = document.getElementById('v-use-detected').checked;
  document.getElementById('v-manual').style.display = use ? 'none' : 'block';
}

// ── Operations ────────────────────────────────────────────────
async function doProvision() {
  var body = {
    app_id:             document.getElementById('p-app').value.trim() || 'default',
    count:              parseInt(document.getElementById('p-count').value) || 1,
    max_devices:        parseInt(document.getElementById('p-devices').value) || 1,
    subscription_level: parseInt(document.getElementById('p-sub').value) || 1,
  };
  var prefix = document.getElementById('p-prefix').value.trim();
  if (prefix) body.prefix = prefix;
  var durVal = document.getElementById('p-dur-val').value.trim();
  var durUnit = document.getElementById('p-dur-unit').value;
  if (durVal && durUnit) { body.duration_value = parseInt(durVal); body.duration_unit = durUnit; }
  var note = document.getElementById('p-note').value.trim();
  var order = document.getElementById('p-order').value.trim();
  var cust = document.getElementById('p-customer').value.trim();
  if (note) body.note = note;
  if (order) body.order_id = order;
  if (cust) body.customer_id = cust;
  await apiFetch(adminBase(), '/api/v1/provision', body);
}

async function doVerify(path) {
  var useDetected = document.getElementById('v-use-detected').checked;
  var hwid = useDetected ? document.getElementById('client-hwid').value : document.getElementById('v-hwid-manual').value.trim();
  var ip   = useDetected ? document.getElementById('client-ip').value   : document.getElementById('v-ip-manual').value.trim();
  var body = {
    app_id:  document.getElementById('v-app').value.trim() || 'default',
    key:     document.getElementById('v-key').value.trim(),
    hwid:    hwid,
    version: document.getElementById('v-version').value.trim() || '1.0.0',
  };
  if (ip) body.ip = ip;
  await apiFetch(apiBase(), path, body);
}

async function doKeyInfo() {
  var app = document.getElementById('i-app').value.trim() || 'default';
  var key = document.getElementById('i-key').value.trim();
  await apiFetch(adminBase(), '/api/v1/keys/info?app_id=' + encodeURIComponent(app) + '&key=' + encodeURIComponent(key), null, 'GET');
}

async function doKeyAction(path) {
  var body = {
    app_id: document.getElementById('m-app').value.trim() || 'default',
    key:    document.getElementById('m-key').value.trim(),
  };
  var reason = document.getElementById('m-reason').value.trim();
  if (reason) body.reason = reason;
  await apiFetch(adminBase(), path, body);
}

// ── Init ─────────────────────────────────────────────────────
loadHwid();
detectIp();
</script>
</body>
</html>
